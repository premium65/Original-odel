<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ODEL - Home</title>

  <style>
    html { 
      scroll-behavior: smooth; 
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

      /* ⭐ BACKGROUND IMAGE */
      background-image: url('home-bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: scroll;

      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* BACKGROUND OVERLAY FIX */
    body::before {
      content: '';
      position: fixed;
      top: 0; 
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.55);
      z-index: 0;
      pointer-events: none;
    }

    /* NAVBAR */
    header {
      position: relative;
      z-index: 5;
      background-color: rgba(0,0,0,0.85);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0; padding: 0;
    }

    nav ul li a {
      color: #f7931e;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      transition: color .3s;
    }

    nav ul li a:hover {
      color: #ffb74d;
    }

    /* ==========================
       USER MENU DROPDOWN (NEW)
       ========================== */
    .user-menu { 
      position: relative; 
      z-index: 20;
    }

    .user-btn {
      background: transparent;
      border: none;
      color: #f7931e;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .dropdown {
      display: none;
      position: absolute;
      top: 35px;
      right: 0;
      background: rgba(0,0,0,0.95);
      border-radius: 10px;
      padding: 10px 0;
      min-width: 180px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
      animation: fadeIn 0.15s ease-out;
    }

    .dropdown a {
      display: block;
      padding: 12px 20px;
      color: white;
      font-size: 14px;
      text-decoration: none;
    }

    .dropdown a:hover {
      background: rgba(255,255,255,0.12);
    }

    /* Logout special style */
    .dropdown .logout {
      color: #ff4444;
    }

    .dropdown .logout:hover {
      background: rgba(255, 68, 68, 0.2);
    }

    /* Show dropdown on hover */
    .user-menu:hover .dropdown {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================
         SLIDER STYLING
       ========================== */
    .slider {
      position: relative !important;
      width: 100%;
      max-height: 520px;
      overflow: hidden;
      margin-top: 20px;
      z-index: 2;
      border-radius: 12px;
    }

    .slides {
      display: none;
      width: 100%;
      animation: fade 1.2s ease-in-out;
    }

    .slides img {
      width: 100%;
      height: 520px;
      object-fit: cover;
      border-radius: 12px;
    }

    @keyframes fade {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    .dots {
      text-align: center;
      position: absolute;
      bottom: 15px;
      width: 100%;
    }

    .dot {
      height: 12px;
      width: 12px;
      margin: 0 5px;
      background-color: #ffffff70;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
    }

    .dot.active {
      background-color: #f7931e;
    }

    /* CONTENT SECTIONS */
    section.featured {
      position: relative;
      z-index: 2;
      padding: 60px 20px;
      text-align: center;
    }

    section.featured h2 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #f7931e;
      text-shadow: 0 0 5px #000;
    }

    section.featured img {
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      opacity: 0;
      transform: scale(0.9);
      animation: fadeZoomIn 1.5s ease-out forwards;
    }

    @keyframes fadeZoomIn {
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
